name: Sync to GitLab

on:
  push:
    branches:
      - '**'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # 🔥 WAJIB biar gak kena shallow error

      - name: Set Git identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Add GitLab remote
        run: |
          git remote remove gitlab || true
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.tako.co.id/ardon.yunors/PPJK_Testing.git

      - name: Push all branches to GitLab
        run: |
          git push gitlab --all --force

      - name: Push tags to GitLab
        run: |
          git push gitlab --tags --force
