stages:
  - push
  - deploy

variables:
  HARBOR_REGISTRY: registry.tako.co.id
  APP_NAME: customer-ppjk

default:
  image: docker:27
  services:
    - docker:27-dind

push-dev:
  stage: push
  before_script:
    - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USERNAME" --password-stdin
  variables:
    IMAGE_NAME: $HARBOR_REGISTRY/tako-apps-dev/$APP_NAME
    IMAGE_TAG_SHA: dev-$CI_COMMIT_SHORT_SHA
    IMAGE_TAG_PIPELINE: dev-$CI_PIPELINE_IID
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG_SHA -t $IMAGE_NAME:$IMAGE_TAG_PIPELINE -t $IMAGE_NAME:dev-latest .
    - docker push $IMAGE_NAME:$IMAGE_TAG_SHA
    - docker push $IMAGE_NAME:$IMAGE_TAG_PIPELINE
    - docker push $IMAGE_NAME:dev-latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev-v2"'

deploy-dev:
  stage: deploy
  image: alpine:3.20
  tags:
    - internal-runner
  needs:
    - push-dev
  before_script:
    - apk add --no-cache openssh-client
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
    - tr -d '\r' < /tmp/deploy_key > /tmp/deploy_key_clean
    - chmod 600 /tmp/deploy_key_clean
    - ssh-add /tmp/deploy_key_clean
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -p "${SSH_PORT:-22}" "$SERVER_HOST" >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - |
      ssh -p "${SSH_PORT:-22}" "$SERVER_USER@$SERVER_HOST" "
        cd '$DEPLOY_PATH' &&
        echo '$HARBOR_PASSWORD' | docker login '$HARBOR_REGISTRY' -u '$HARBOR_USERNAME' --password-stdin &&
        docker compose pull &&
        docker compose up -d --remove-orphans
      "
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev-v2"'
